<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finanzas Personales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { font-family: 'DM Sans', sans-serif; background: #f7f5f0; }
    button { font-family: inherit; }
    input { font-family: inherit; }
    textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    @media (max-width: 640px) {
      #root { overflow-x: hidden; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (no install needed) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─── UTILS ───────────────────────────────────────────────────────────────

    const CATS = {
      Alimentación:    { icon: "🍽️", color: "#e07b54", light: "#fdf0ea" },
      Transporte:      { icon: "🚌", color: "#4a8fe8", light: "#eaf2fd" },
      Servicios:       { icon: "⚡", color: "#e8b84a", light: "#fdf7ea" },
      Salud:           { icon: "🏥", color: "#e84a6f", light: "#fdeaf0" },
      Entretenimiento: { icon: "🎮", color: "#9b59b6", light: "#f5edfb" },
      Ropa:            { icon: "👕", color: "#e84a4a", light: "#fdeaea" },
      Educación:       { icon: "📚", color: "#27ae60", light: "#eafaf1" },
      Hogar:           { icon: "🏠", color: "#7f8c8d", light: "#f2f3f3" },
      Ingreso:         { icon: "💰", color: "#27ae60", light: "#eafaf1" },
      Otro:            { icon: "📌", color: "#95a5a6", light: "#f2f4f4" },
    };

    const KEYWORDS = {
      Alimentación:    ["almuerzo","comida","cena","desayuno","restaurante","pollo","pizza","mercado","soda","bebida","cafe","café","chifa","ceviche","feria","fruta","verdura","pan","menú","menu","tamal","snack"],
      Transporte:      ["taxi","bus","uber","combi","metro","gasolina","combustible","pasaje","micro","mototaxi","colectivo","tren","movilidad","indriver"],
      Servicios:       ["luz","agua","internet","cable","teléfono","telefono","gas","celular","recibo","servicio","plan","electricidad","movistar","claro","entel"],
      Salud:           ["farmacia","médico","medico","doctor","clínica","clinica","medicamento","pastilla","consulta","hospital","salud","botica","inkafarma"],
      Entretenimiento: ["cine","pelicula","película","netflix","spotify","juego","concierto","fiesta","bar","salida","entretenimiento","disney","youtube","prime"],
      Ropa:            ["ropa","zapato","zapatilla","camisa","pantalón","pantalon","vestido","polo","casaca","gamarra","saga","ripley","prenda"],
      Educación:       ["curso","libro","universidad","colegio","escuela","clase","educación","educacion","taller","instituto","udemy","platzi"],
      Hogar:           ["mueble","electrodoméstico","electrodomestico","limpieza","herramienta","alquiler","casa","hogar","reparación","reparacion","mantenimiento"],
      Ingreso:         ["sueldo","salario","ingreso","cobré","cobre","recibí","recibi","pago","pagaron","gané","gane","venta","factura","honorario","propina","bono"],
    };

    function classify(text) {
      const lower = text.toLowerCase();
      for (const [cat, words] of Object.entries(KEYWORDS)) {
        if (words.some(w => lower.includes(w))) return cat;
      }
      return "Otro";
    }

    function parseAmount(text) {
      const matches = text.match(/(\d+(?:[.,]\d+)?)/g);
      if (!matches) return 0;
      const nums = matches.map(n => parseFloat(n.replace(",", ".")));
      return Math.max(...nums);
    }

    function isIncome(text, cat) {
      if (cat === "Ingreso") return true;
      const lower = text.toLowerCase();
      return ["recibí","recibi","cobré","cobre","gané","gane","me pagaron","ingresó","ingreso"].some(w => lower.includes(w));
    }

    const fmt = n => "S/ " + Number(n).toLocaleString("es-PE", { minimumFractionDigits: 0, maximumFractionDigits: 2 });

    function getMonthKey(date) {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    }

    function monthLabel(key) {
      const [y, m] = key.split("-");
      return new Date(parseInt(y), parseInt(m)-1, 1)
        .toLocaleDateString("es-PE", { month: "long", year: "numeric" });
    }

    // ─── SPARK BAR ───────────────────────────────────────────────────────────

    function SparkBar({ data, color }) {
      if (!data.length) return null;
      const max = Math.max(...data);
      return (
        <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height: 36, marginTop: 8 }}>
          {data.map((v, i) => (
            <div key={i} style={{
              flex: 1,
              height: max > 0 ? `${Math.max(6, (v / max) * 100)}%` : "6%",
              background: color,
              borderRadius: "3px 3px 0 0",
              opacity: i === data.length - 1 ? 1 : 0.25 + (i / data.length) * 0.6,
            }} />
          ))}
        </div>
      );
    }

    // ─── DONUT ───────────────────────────────────────────────────────────────

    function DonutChart({ segments }) {
      const size = 130, r = 48, cx = 65, cy = 65;
      const circ = 2 * Math.PI * r;
      let offset = 0;
      const slices = segments.map(s => {
        const dash = (s.pct / 100) * circ;
        const sl = { ...s, dash, gap: circ - dash, offset };
        offset += dash;
        return sl;
      });
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0ede8" strokeWidth={16}/>
          {slices.map((s, i) => (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none"
              stroke={s.color} strokeWidth={16}
              strokeDasharray={`${s.dash} ${s.gap}`}
              strokeDashoffset={-s.offset}
            />
          ))}
        </svg>
      );
    }

    // ─── TX ROW ──────────────────────────────────────────────────────────────

    function TxRow({ tx, onDelete }) {
      const [hover, setHover] = useState(false);
      const cfg = CATS[tx.cat] || CATS["Otro"];
      const dateStr = new Date(tx.date).toLocaleDateString("es-PE", { day: "numeric", month: "short" });
      return (
        <div
          style={{
            display: "flex", alignItems: "center", gap: 12,
            padding: "9px 8px", borderRadius: 8,
            background: hover ? "#fafaf8" : "transparent",
            transition: "background 0.12s", cursor: "default",
          }}
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
        >
          <div style={{ width: 34, height: 34, borderRadius: 9, background: cfg.light, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 16 }}>
            {cfg.icon}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, color: "#2c2c2a", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{tx.text}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#aaa", marginTop: 2 }}>
              <span style={{ fontSize: 11, padding: "1px 7px", borderRadius: 20, background: cfg.light, color: cfg.color, fontWeight: 500 }}>{tx.cat}</span>
              <span style={{ color: "#ccc" }}>·</span>
              <span>{dateStr}</span>
            </div>
          </div>
          <span style={{ fontSize: 14, fontWeight: 700, color: tx.type === "income" ? "#27ae60" : "#e84a4a", whiteSpace: "nowrap" }}>
            {tx.type === "income" ? "+" : "−"}{fmt(tx.amount)}
          </span>
          {hover && (
            <button
              onClick={() => onDelete(tx.id)}
              style={{ background: "#fdeaea", color: "#e84a4a", border: "none", borderRadius: 6, width: 24, height: 24, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "inherit", flexShrink: 0 }}
            >✕</button>
          )}
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────

    function App() {
      const [transactions, setTransactions] = useState(() => {
        try { return JSON.parse(localStorage.getItem("finanzas_txs") || "[]"); }
        catch { return []; }
      });
      const [budget, setBudget] = useState(() => {
        try { return JSON.parse(localStorage.getItem("finanzas_budget") || "{}"); }
        catch { return {}; }
      });
      const [input, setInput] = useState("");
      const [tab, setTab] = useState("dashboard");
      const [toast, setToast] = useState(null);
      const [budgetInput, setBudgetInput] = useState("");
      const [editingBudget, setEditingBudget] = useState(false);
      const [filterCat, setFilterCat] = useState("Todas");
      const [mobileMenu, setMobileMenu] = useState(false);
      const textRef = useRef(null);
      const toastTimer = useRef(null);

      useEffect(() => { localStorage.setItem("finanzas_txs", JSON.stringify(transactions)); }, [transactions]);
      useEffect(() => { localStorage.setItem("finanzas_budget", JSON.stringify(budget)); }, [budget]);

      function showToast(msg, type = "ok") {
        clearTimeout(toastTimer.current);
        setToast({ msg, type });
        toastTimer.current = setTimeout(() => setToast(null), 2800);
      }

      function handleAdd() {
        const text = input.trim();
        if (!text) return;
        const cat = classify(text);
        const amount = parseAmount(text);
        if (amount <= 0) { showToast("No encontré un monto. Ej: 'gasté 45 en almuerzo'", "err"); return; }
        const type = isIncome(text, cat) ? "income" : "expense";
        const short = text.length > 50 ? text.slice(0, 47) + "…" : text;
        const tx = { id: Date.now(), text: short, amount, cat: type === "income" ? "Ingreso" : cat, type, date: new Date().toISOString() };
        setTransactions(prev => [tx, ...prev]);
        setInput("");
        showToast(`${type === "income" ? "💰" : "✓"} ${CATS[tx.cat].icon} ${fmt(amount)} registrado`);
        textRef.current?.focus();
      }

      function deleteTx(id) { setTransactions(prev => prev.filter(t => t.id !== id)); }

      function exportCSV() {
        const rows = [["Fecha","Descripción","Categoría","Tipo","Monto"]];
        transactions.forEach(t => {
          rows.push([new Date(t.date).toLocaleDateString("es-PE"), `"${t.text}"`, t.cat, t.type === "income" ? "Ingreso" : "Gasto", t.amount]);
        });
        const csv = rows.map(r => r.join(",")).join("\n");
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a"); a.href = url; a.download = "finanzas.csv"; a.click();
        URL.revokeObjectURL(url);
        showToast("CSV descargado 📁");
      }

      // computed
      const thisMonthKey = getMonthKey(new Date());
      const thisMonth = transactions.filter(t => getMonthKey(t.date) === thisMonthKey);
      const totalIncome = thisMonth.filter(t => t.type === "income").reduce((a,b)=>a+b.amount,0);
      const totalExpense = thisMonth.filter(t => t.type === "expense").reduce((a,b)=>a+b.amount,0);
      const balance = totalIncome - totalExpense;

      const catTotals = useMemo(() => {
        const map = {};
        thisMonth.filter(t => t.type === "expense").forEach(t => { map[t.cat] = (map[t.cat]||0) + t.amount; });
        return Object.entries(map).sort((a,b) => b[1]-a[1]);
      }, [thisMonth]);

      const donutSegments = useMemo(() => {
        const total = catTotals.reduce((a,b)=>a+b[1],0);
        return catTotals.map(([cat,val]) => ({ cat, val, pct: total > 0 ? (val/total)*100 : 0, color: CATS[cat]?.color||"#95a5a6" }));
      }, [catTotals]);

      const sparkData = useMemo(() => {
        const months = [];
        for (let i = 6; i >= 0; i--) {
          const d = new Date(); d.setMonth(d.getMonth()-i);
          const key = getMonthKey(d);
          months.push(transactions.filter(t => getMonthKey(t.date) === key && t.type === "expense").reduce((a,b)=>a+b.amount,0));
        }
        return months;
      }, [transactions]);

      const monthlyGrouped = useMemo(() => {
        const map = {};
        transactions.forEach(t => { const k = getMonthKey(t.date); if(!map[k]) map[k]=[]; map[k].push(t); });
        return Object.entries(map).sort((a,b) => b[0].localeCompare(a[0]));
      }, [transactions]);

      const filteredTxs = useMemo(() => filterCat === "Todas" ? transactions : transactions.filter(t => t.cat === filterCat), [transactions, filterCat]);

      const budgetUsed = budget.monthly > 0 ? Math.min((totalExpense / budget.monthly) * 100, 100) : 0;
      const budgetLeft = budget.monthly > 0 ? Math.max(budget.monthly - totalExpense, 0) : null;

      const navItems = [
        { id: "dashboard", label: "Dashboard", icon: "📊" },
        { id: "history",   label: "Historial",  icon: "📋" },
        { id: "budget",    label: "Presupuesto", icon: "🎯" },
      ];

      function goTab(id) { setTab(id); setMobileMenu(false); }

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: "#f7f5f0" }}>

          {/* SIDEBAR */}
          <aside style={{
            width: 200, background: "#1a1a18", display: "flex", flexDirection: "column",
            padding: "24px 0", flexShrink: 0, position: "sticky", top: 0, height: "100vh",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "0 20px 24px", borderBottom: "1px solid #2c2c2a" }}>
              <div style={{ fontSize: 20, background: "#e07b54", color: "#fff", width: 34, height: 34, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>₿</div>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#f0ede8", letterSpacing: "0.02em" }}>Finanzas</div>
                <div style={{ fontSize: 11, color: "#555", textTransform: "uppercase", letterSpacing: "0.08em" }}>personal</div>
              </div>
            </div>

            <nav style={{ flex: 1, padding: "14px 10px", display: "flex", flexDirection: "column", gap: 3 }}>
              {navItems.map(item => (
                <button key={item.id}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "9px 12px",
                    borderRadius: 8, border: "none", cursor: "pointer", textAlign: "left",
                    width: "100%", fontSize: 14, fontFamily: "inherit",
                    background: tab === item.id ? "#2c2c2a" : "transparent",
                    color: tab === item.id ? "#f0ede8" : "#888",
                    fontWeight: tab === item.id ? 500 : 400,
                  }}
                  onClick={() => goTab(item.id)}>
                  <span style={{ fontSize: 16 }}>{item.icon}</span>
                  <span>{item.label}</span>
                </button>
              ))}
            </nav>

            <div style={{ padding: "14px 14px 0", borderTop: "1px solid #2c2c2a" }}>
              <button
                onClick={exportCSV}
                style={{ width: "100%", padding: "9px 0", background: "transparent", border: "1px solid #3a3a38", color: "#888", borderRadius: 8, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                ↓ Exportar CSV
              </button>
              <div style={{ fontSize: 11, color: "#3a3a38", marginTop: 10, textAlign: "center" }}>● Sin conexión requerida</div>
            </div>
          </aside>

          {/* MAIN */}
          <main style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "auto", minWidth: 0 }}>

            {/* INPUT BAR */}
            <div style={{ background: "#fff", borderBottom: "1px solid #ebe8e0", padding: "14px 24px", position: "sticky", top: 0, zIndex: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, background: "#f7f5f0", borderRadius: 12, padding: "8px 12px" }}>
                <span style={{ fontSize: 16 }}>✏️</span>
                <input
                  ref={textRef}
                  style={{ flex: 1, border: "none", background: "transparent", fontSize: 14, color: "#2c2c2a", outline: "none", fontFamily: "inherit", padding: "2px 0" }}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && handleAdd()}
                  placeholder="¿Qué compraste? ej: 'gasté 45 soles en almuerzo' o 'recibí sueldo de 2500'"
                />
                <button onClick={handleAdd} style={{ background: "#1a1a18", color: "#f0ede8", border: "none", borderRadius: 8, padding: "8px 18px", fontSize: 13, fontWeight: 500, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "inherit" }}>
                  Registrar →
                </button>
              </div>
              <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                {["taxi 25s","almuerzo 30s","sueldo 2800","luz 120s","farmacia 45"].map(h => (
                  <button key={h} onClick={() => setInput(h)}
                    style={{ fontSize: 12, padding: "3px 10px", border: "1px solid #e0ddd6", borderRadius: 20, background: "#fff", color: "#999", cursor: "pointer", fontFamily: "inherit" }}>
                    {h}
                  </button>
                ))}
              </div>
            </div>

            {/* TOAST */}
            {toast && (
              <div style={{
                margin: "10px 24px 0", padding: "10px 16px", borderRadius: 10, fontSize: 13, fontWeight: 500,
                background: toast.type === "err" ? "#fdeaea" : "#eafaf1",
                color: toast.type === "err" ? "#a32d2d" : "#1a5e33",
                border: `1px solid ${toast.type === "err" ? "#f7c1c1" : "#c0dd97"}`,
              }}>
                {toast.msg}
              </div>
            )}

            <div style={{ padding: "20px 24px", flex: 1 }}>

              {/* ═══ DASHBOARD ═══ */}
              {tab === "dashboard" && (<>
                <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 14 }}>
                  {monthLabel(thisMonthKey)}
                </div>

                {/* Metrics */}
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 14 }}>
                  {[
                    { label: "Ingresos", value: fmt(totalIncome), color: "#27ae60", data: [...Array(6).fill(0), totalIncome] },
                    { label: "Gastos", value: fmt(totalExpense), color: "#e07b54", data: sparkData },
                    { label: "Balance", value: fmt(balance), color: balance >= 0 ? "#27ae60" : "#e84a4a", sub: balance >= 0 ? "✓ En positivo" : "⚠️ Negativo" },
                  ].map(m => (
                    <div key={m.label} style={{ background: "#fff", borderRadius: 12, padding: "14px 16px", border: "1px solid #ebe8e0", borderLeft: `4px solid ${m.color}` }}>
                      <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 4 }}>{m.label}</div>
                      <div style={{ fontSize: 22, fontWeight: 700, color: m.color, letterSpacing: "-0.02em" }}>{m.value}</div>
                      {m.data ? <SparkBar data={m.data} color={m.color} /> : <div style={{ fontSize: 12, color: "#bbb", marginTop: 6 }}>{m.sub}</div>}
                    </div>
                  ))}
                </div>

                {/* Budget bar */}
                {budget.monthly > 0 && (
                  <div style={{ background: "#fff", borderRadius: 12, padding: "12px 16px", border: "1px solid #ebe8e0", marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                      <span style={{ fontSize: 13, color: "#666" }}>Presupuesto: <strong>{fmt(budget.monthly)}</strong></span>
                      <span style={{ fontSize: 13, fontWeight: 600, color: budgetUsed > 85 ? "#e84a4a" : "#27ae60" }}>{budgetUsed.toFixed(0)}% usado</span>
                    </div>
                    <div style={{ height: 7, background: "#f0ede8", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 4, transition: "width 0.5s", width: `${budgetUsed}%`, background: budgetUsed > 85 ? "#e84a4a" : budgetUsed > 60 ? "#e8b84a" : "#27ae60" }}/>
                    </div>
                    {budgetLeft !== null && <div style={{ fontSize: 12, color: "#bbb", marginTop: 6 }}>Disponible: {fmt(budgetLeft)}</div>}
                  </div>
                )}

                {/* Category chart */}
                {catTotals.length > 0 ? (
                  <div style={{ background: "#fff", borderRadius: 12, padding: "16px 18px", border: "1px solid #ebe8e0", marginBottom: 14 }}>
                    <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Gastos por categoría</div>
                    <div style={{ display: "flex", gap: 20, alignItems: "center" }}>
                      <DonutChart segments={donutSegments} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        {catTotals.map(([cat, val]) => {
                          const pct = totalExpense > 0 ? ((val/totalExpense)*100).toFixed(0) : 0;
                          return (
                            <div key={cat} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 9 }}>
                              <span style={{ fontSize: 14 }}>{CATS[cat]?.icon}</span>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ display: "flex", justifyContent: "space-between" }}>
                                  <span style={{ fontSize: 13, fontWeight: 500, color: "#2c2c2a" }}>{cat}</span>
                                  <span style={{ fontSize: 13, color: "#666" }}>{fmt(val)}</span>
                                </div>
                                <div style={{ height: 4, background: "#f0ede8", borderRadius: 2, overflow: "hidden", marginTop: 3 }}>
                                  <div style={{ height: "100%", borderRadius: 2, width: `${pct}%`, background: CATS[cat]?.color, transition: "width 0.5s" }}/>
                                </div>
                              </div>
                              <span style={{ fontSize: 11, color: "#ccc", minWidth: 28, textAlign: "right" }}>{pct}%</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                ) : (
                  <div style={{ textAlign: "center", padding: "40px 0", color: "#ccc" }}>
                    <div style={{ fontSize: 40 }}>📊</div>
                    <p style={{ marginTop: 10, fontSize: 14 }}>Agrega tus primeros gastos para ver el análisis</p>
                  </div>
                )}

                {/* Recent */}
                {thisMonth.length > 0 && (
                  <div style={{ background: "#fff", borderRadius: 12, padding: "16px 18px", border: "1px solid #ebe8e0" }}>
                    <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Últimos movimientos</div>
                    {thisMonth.slice(0, 8).map(tx => <TxRow key={tx.id} tx={tx} onDelete={deleteTx} />)}
                  </div>
                )}
              </>)}

              {/* ═══ HISTORIAL ═══ */}
              {tab === "history" && (<>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 16 }}>
                  {["Todas", ...Object.keys(CATS)].map(c => (
                    <button key={c} onClick={() => setFilterCat(c)}
                      style={{ fontSize: 12, padding: "5px 12px", border: "1px solid", borderRadius: 20, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s",
                        background: filterCat === c ? "#1a1a18" : "#fff",
                        color: filterCat === c ? "#f0ede8" : "#888",
                        borderColor: filterCat === c ? "#1a1a18" : "#ddd",
                      }}>
                      {CATS[c]?.icon || "🔍"} {c}
                    </button>
                  ))}
                </div>

                {filteredTxs.length === 0
                  ? <div style={{ textAlign: "center", padding: "48px 0", color: "#ccc" }}><div style={{ fontSize: 36 }}>🗂️</div><p style={{ marginTop: 10, fontSize: 14 }}>No hay movimientos aún</p></div>
                  : monthlyGrouped.map(([key, txs]) => {
                      const filtered = filterCat === "Todas" ? txs : txs.filter(t => t.cat === filterCat);
                      if (!filtered.length) return null;
                      const mi = filtered.filter(t=>t.type==="income").reduce((a,b)=>a+b.amount,0);
                      const me = filtered.filter(t=>t.type==="expense").reduce((a,b)=>a+b.amount,0);
                      return (
                        <div key={key} style={{ background: "#fff", borderRadius: 12, padding: "16px 18px", border: "1px solid #ebe8e0", marginBottom: 12 }}>
                          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                            <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em" }}>{monthLabel(key)}</div>
                            <div style={{ display: "flex", gap: 10, fontSize: 12 }}>
                              {mi > 0 && <span style={{ color: "#27ae60", fontWeight: 600 }}>+{fmt(mi)}</span>}
                              {me > 0 && <span style={{ color: "#e07b54", fontWeight: 600 }}>-{fmt(me)}</span>}
                            </div>
                          </div>
                          {filtered.map(tx => <TxRow key={tx.id} tx={tx} onDelete={deleteTx} />)}
                        </div>
                      );
                    })
                }
              </>)}

              {/* ═══ PRESUPUESTO ═══ */}
              {tab === "budget" && (<>
                <div style={{ background: "#fff", borderRadius: 12, padding: "18px 20px", border: "1px solid #ebe8e0", marginBottom: 14 }}>
                  <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 12 }}>Presupuesto mensual</div>
                  <p style={{ fontSize: 14, color: "#999", marginBottom: 14, lineHeight: 1.6 }}>
                    Define cuánto puedes gastar al mes. Puedes cambiarlo cuando quieras.
                  </p>
                  {editingBudget ? (
                    <div style={{ display: "flex", gap: 8 }}>
                      <input
                        style={{ flex: 1, maxWidth: 180, padding: "9px 12px", border: "1px solid #ddd", borderRadius: 8, fontSize: 14, outline: "none", fontFamily: "inherit" }}
                        placeholder="ej: 2000"
                        value={budgetInput}
                        onChange={e => setBudgetInput(e.target.value)}
                        onKeyDown={e => { if (e.key === "Enter") { const v = parseFloat(budgetInput); if (v>0) { setBudget({monthly:v}); setEditingBudget(false); setBudgetInput(""); showToast("Presupuesto guardado ✓"); } } }}
                        autoFocus
                      />
                      <button onClick={() => { const v = parseFloat(budgetInput); if(v>0){setBudget({monthly:v});setEditingBudget(false);setBudgetInput("");showToast("Presupuesto guardado ✓");}}}
                        style={{ background: "#1a1a18", color: "#f0ede8", border: "none", borderRadius: 8, padding: "9px 16px", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                        Guardar
                      </button>
                      <button onClick={() => setEditingBudget(false)}
                        style={{ background: "transparent", color: "#999", border: "1px solid #ddd", borderRadius: 8, padding: "9px 14px", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>
                        Cancelar
                      </button>
                    </div>
                  ) : (
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <span style={{ fontSize: 28, fontWeight: 700, color: "#2c2c2a" }}>{budget.monthly > 0 ? fmt(budget.monthly) : "—"}</span>
                      <button onClick={() => { setEditingBudget(true); setBudgetInput(budget.monthly||""); }}
                        style={{ fontSize: 13, padding: "7px 14px", border: "1px solid #ddd", borderRadius: 8, background: "#fff", color: "#666", cursor: "pointer", fontFamily: "inherit" }}>
                        {budget.monthly ? "Editar" : "Establecer presupuesto"}
                      </button>
                    </div>
                  )}
                </div>

                {budget.monthly > 0 && (
                  <div style={{ background: "#fff", borderRadius: 12, padding: "18px 20px", border: "1px solid #ebe8e0", marginBottom: 14 }}>
                    <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Estado — {monthLabel(thisMonthKey)}</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 18 }}>
                      {[
                        { label: "Presupuesto", val: fmt(budget.monthly), color: "#4a8fe8" },
                        { label: "Gastado", val: fmt(totalExpense), color: "#e07b54" },
                        { label: "Disponible", val: fmt(Math.max(budget.monthly-totalExpense,0)), color: totalExpense > budget.monthly ? "#e84a4a" : "#27ae60" },
                      ].map(m => (
                        <div key={m.label} style={{ textAlign: "center", padding: "12px 6px", background: "#fafaf8", borderRadius: 9, border: "1px solid #ebe8e0" }}>
                          <div style={{ fontSize: 11, color: "#bbb", marginBottom: 4 }}>{m.label}</div>
                          <div style={{ fontSize: 16, fontWeight: 700, color: m.color }}>{m.val}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ height: 8, background: "#f0ede8", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 4, width: `${budgetUsed}%`, background: budgetUsed>85?"#e84a4a":budgetUsed>60?"#e8b84a":"#27ae60", transition: "width 0.5s" }}/>
                    </div>
                    <div style={{ fontSize: 13, marginTop: 8, color: budgetUsed > 85 ? "#e84a4a" : "#999" }}>
                      {budgetUsed >= 100 ? "⚠️ Superaste tu presupuesto este mes"
                        : budgetUsed > 75 ? `⚠️ Llevas el ${budgetUsed.toFixed(0)}% — queda poco`
                        : `✓ Llevas el ${budgetUsed.toFixed(0)}% del presupuesto`}
                    </div>
                  </div>
                )}

                <div style={{ background: "#fff", borderRadius: 12, padding: "18px 20px", border: "1px solid #ebe8e0" }}>
                  <div style={{ fontSize: 11, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14 }}>Por categoría — {monthLabel(thisMonthKey)}</div>
                  {catTotals.length === 0
                    ? <p style={{ color: "#ccc", fontSize: 14 }}>Sin gastos registrados este mes.</p>
                    : catTotals.map(([cat, val]) => (
                      <div key={cat} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                        <span style={{ fontSize: 18 }}>{CATS[cat]?.icon}</span>
                        <span style={{ flex: 1, fontSize: 14, color: "#333" }}>{cat}</span>
                        <span style={{ fontSize: 14, fontWeight: 700, color: CATS[cat]?.color }}>{fmt(val)}</span>
                      </div>
                    ))
                  }
                </div>
              </>)}

            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
